<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — THECLUSTER</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background-color: #020617;
        color: #f1f5f9;
        font-family: ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 36rem;
        border-radius: 1.5rem;
        border: 1px solid #1e293b;
        background-color: rgba(15, 23, 42, 0.8);
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(2, 6, 23, 0.5);
      }
      .eyebrow {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        color: #22d3ee;
      }
      .code {
        margin-top: 1rem;
        font-size: 4rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 1;
      }
      .message {
        margin-top: 1rem;
        font-size: 1rem;
        color: #cbd5e1;
      }
      .back {
        margin-top: 2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background-color: #22d3ee;
        padding: 0.75rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #020617;
        text-decoration: none;
        transition: background-color 0.15s;
      }
      .back:hover { background-color: #67e8f9; }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">THECLUSTER</p>
      <p class="code">404</p>
      <p class="message">Page not found. The resource you requested does not exist.</p>
      <a href="/" class="back">Go home</a>
    </div>
  </body>
</html>
