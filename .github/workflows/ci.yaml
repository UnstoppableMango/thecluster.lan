name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: bun install --frozen-lockfile
      - run: bun run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/api/go.mod

      - run: go test ./...

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - run: nix flake check --all-systems
      - run: nix build .#api .#web .#app .#ctr

  helm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/thecluster
    env:
      HELM_EXPERIMENTAL_OCI: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - run: helm lint .

      - name: Helm package
        run: helm package . --destination "$RUNNER_TEMP"

      - name: Helm login
        if: github.event_name == 'push'
        run: echo "${{ github.token }}" | helm registry login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Helm push
        if: github.event_name == 'push'
        run: |
          chart="$(find "$RUNNER_TEMP" -maxdepth 1 -name 'thecluster-*.tgz' -print -quit)"
          helm push "$chart" "oci://ghcr.io/${REPOSITORY,,}"
        env:
          REPOSITORY: ${{ github.repository }}

  docker:
    runs-on: ubuntu-latest
    needs: [nix]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          github_access_token: ${{ github.token }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/dashboard
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image stream
        run: |
          nix build .#ctr
          ./result | docker load

      - name: Tag and push image
        if: github.event_name == 'push'
        run: |
          image_id="thecluster.lan/dashboard:latest"
          docker image inspect "$image_id" >/dev/null
          while IFS= read -r target; do
            [ -n "$target" ] || continue
            docker tag "$image_id" "$target"
            docker push "$target"
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF
