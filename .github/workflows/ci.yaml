name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/api/go.mod

      - run: go test ./...

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - run: nix flake check --all-systems
      - run: nix build .#api .#web .#app .#ctr

  helm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/thecluster
    env:
      HELM_EXPERIMENTAL_OCI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - run: helm lint .

      - name: Helm package
        run: helm package . --destination "$RUNNER_TEMP"

      - name: Helm login
        if: github.event_name == 'push'
        run: echo "${{ github.token }}" | helm registry login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Helm push
        if: github.event_name == 'push'
        run: |
          chart="$(find "$RUNNER_TEMP" -maxdepth 1 -name 'thecluster-*.tgz' -print -quit)"
          helm push "$chart" "oci://ghcr.io/${REPOSITORY,,}"
        env:
          REPOSITORY: ${{ github.repository }}

  docker:
    runs-on: ubuntu-latest
    needs: [nix]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image stream
        run: |
          nix build .#ctr
          ./result | docker load

      - name: Tag and push image
        run: |
          image_id="$(docker images --format '{{.Repository}}:{{.Tag}}' | grep '^thecluster.lan:' | head -n 1)"
          target="ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}"
          docker tag "$image_id" "$target"
          docker push "$target"
