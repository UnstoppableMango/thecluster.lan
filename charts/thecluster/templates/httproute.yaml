{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "thecluster.fullname" . }}
  labels:
    {{- include "thecluster.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- required "httpRoute.parentRefs is required when httpRoute.enabled=true (e.g. [{name: my-gateway, namespace: gateway-ns}])" (.Values.httpRoute.parentRefs | default "" | empty | not | ternary .Values.httpRoute.parentRefs nil) | toYaml | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "thecluster.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
